<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מסך מפוצל - 6 ערוצים</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: Arial, sans-serif; }
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            width: 100vw; height: 100vh; gap: 2px; background-color: #222;
        }
        .grid-item { position: relative; width: 100%; height: 100%; background-color: #111; display: flex; justify-content: center; align-items: center; color: #555; }
        iframe, video { width: 100%; height: 100%; border: none; display: block; position: absolute; top: 0; left: 0; object-fit: cover; }
        .label { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 4px 8px; font-size: 14px; border-radius: 4px; z-index: 10; pointer-events: none; }
        .status-text { font-size: 14px; }
        .error-msg { color: #ff5555; font-size: 12px; text-align: center; padding: 10px; }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item" id="container-12"><div class="label">קשת 12</div><span class="status-text">מתחבר...</span></div>
        <div class="grid-item" id="container-11"><div class="label">כאן 11</div><span class="status-text">מתחבר...</span></div>
        <div class="grid-item" id="container-14"><div class="label">ערוץ 14</div><span class="status-text">מתחבר...</span></div>
        <div class="grid-item" id="container-i24"><div class="label">i24News</div><span class="status-text">מתחבר...</span></div>
        <div class="grid-item" id="container-dw"><div class="label">DW News</div><span class="status-text">מתחבר...</span></div>
        <div class="grid-item" id="container-nbc"><div class="label">NBC News</div><span class="status-text">מתחבר...</span></div>
    </div>

    <script>
        function loadChannel(channelCode, containerId) {
            const container = document.getElementById(containerId);
            const labelText = container.querySelector('.label').innerText;

            fetch(`api.php?channel=${channelCode}&t=${new Date().getTime()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // טיפול בערוצים מסוג Iframe (12, 14, DW, NBC)
                        if (data.type === 'iframe') {
                            container.innerHTML = `<div class="label">${labelText}</div>
                                                   <iframe src="${data.url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
                        } 
                        // טיפול בערוצים מסוג HLS (כאן 11 ו-i24)
                        else if (data.type === 'hls') {
                            container.innerHTML = `<div class="label">${labelText}</div>
                                                   <video id="vid-${channelCode}" autoplay muted controls></video>`;
                            
                            const video = document.getElementById(`vid-${channelCode}`);
                            if (Hls.isSupported()) {
                                const hls = new Hls();
                                hls.loadSource(data.url);
                                hls.attachMedia(video);
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = data.url;
                            }
                        }
                    } else {
                        container.innerHTML = `<div class="label">${labelText}</div>
                                               <div class="error-msg">שגיאה: ${data.message}</div>`;
                    }
                })
                .catch(err => {
                    container.innerHTML = `<div class="label">${labelText}</div>
                                           <div class="error-msg">שגיאת רשת</div>`;
                });
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadChannel('12', 'container-12');
            loadChannel('11', 'container-11');
            loadChannel('14', 'container-14');
            loadChannel('i24', 'container-i24');
            loadChannel('dw', 'container-dw');
            loadChannel('nbc', 'container-nbc');
        });
    </script>
</body>
</html>
